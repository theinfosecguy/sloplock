name: Action Smoke

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  action-smoke:
    name: Local action smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build action bundle
        run: npm run build

      - name: Verify generated artifacts are current
        run: git diff --exit-code -- dist

      - name: Run multi-ecosystem action smoke
        run: npm run smoke:ecosystems

      - name: Verify smoke left no artifacts
        run: |
          git diff --exit-code -- dist
          test -z "$(find . -maxdepth 1 -name '*.tgz' -print)"
