name: Action Smoke

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  action-smoke:
    name: Local action smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build action bundle
        run: npm run build

      - name: Verify generated artifacts are current
        run: git diff --exit-code -- dist

      - name: Prepare passing fixture
        run: |
          mkdir -p "${RUNNER_TEMP}/sloplock-action-pass"
          node -e 'const fs = require("node:fs"); fs.writeFileSync(`${process.env.RUNNER_TEMP}/sloplock-action-pass/package.json`, JSON.stringify({ dependencies: { react: "^18.2.0" } }, null, 2));'

      - name: Run local action on passing fixture
        uses: ./
        with:
          path: ${{ runner.temp }}/sloplock-action-pass
          changed-only: "false"
          comment: "false"

      - name: Prepare failing fixture
        run: |
          mkdir -p "${RUNNER_TEMP}/sloplock-action-fail"
          node -e 'const fs = require("node:fs"); const name = `sloplock-smoke-missing-${Date.now()}-${process.pid}`; fs.writeFileSync(`${process.env.RUNNER_TEMP}/sloplock-action-fail/package.json`, JSON.stringify({ dependencies: { [name]: "^1.0.0" } }, null, 2));'

      - name: Run local action on failing fixture
        id: failing-scan
        uses: ./
        continue-on-error: true
        with:
          path: ${{ runner.temp }}/sloplock-action-fail
          changed-only: "false"
          comment: "false"

      - name: Verify failing fixture failed
        run: test "${{ steps.failing-scan.outcome }}" = "failure"
