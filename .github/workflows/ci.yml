name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  generated-artifact-policy:
    name: Generated artifact policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Verify dist changes are isolated
        id: dist-policy
        run: node scripts/ci/check-dist-pr-policy.mjs --base origin/${{ github.base_ref }}

      - name: Install dependencies
        if: steps.dist-policy.outputs.dist_changed == 'true'
        run: npm ci

      - name: Build generated artifacts
        if: steps.dist-policy.outputs.dist_changed == 'true'
        run: npm run build

      - name: Verify generated artifacts are current
        if: steps.dist-policy.outputs.dist_changed == 'true'
        run: npm run check:dist-current

  quality:
    name: Quality / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=low

      - name: Build
        run: npm run build

      - name: Check package contents
        run: npm run pack:dry-run

      - name: Verify package smoke
        run: npm run smoke:package

      - name: Verify smoke left no artifacts
        run: test -z "$(find . -maxdepth 1 -name '*.tgz' -print)"
