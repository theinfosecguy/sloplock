name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=low

      - name: Build
        run: npm run build

      - name: Verify generated artifacts are current
        run: git diff --exit-code -- dist

      - name: Verify multi-ecosystem smoke
        if: matrix.node-version == 24
        run: npm run smoke:ecosystems

      - name: Check package contents
        run: npm run pack:dry-run

      - name: Verify package smoke
        run: npm run smoke:package

      - name: Verify smoke left no artifacts
        run: |
          git diff --exit-code -- dist
          test -z "$(find . -maxdepth 1 -name '*.tgz' -print)"
